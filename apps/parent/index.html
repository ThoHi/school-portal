<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parent Portal - Scholastica</title>
<meta name="theme-color" content="#000a1e"/>
<meta name="description" content="Parent view of your child's report — Scholastica"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "tertiary-fixed": "#ffe088", "secondary-container": "#d5e3fc", "primary": "#000a1e",
        "surface-container": "#efedf1", "on-error": "#ffffff", "on-surface-variant": "#44474e",
        "on-secondary-container": "#57657a", "surface-dim": "#dad9dd", "primary-fixed-dim": "#aec7f6",
        "tertiary-container": "#cca830", "inverse-primary": "#aec7f6",
        "surface-container-highest": "#e3e2e6", "on-tertiary-container": "#4f3e00",
        "surface": "#faf9fd", "surface-variant": "#e3e2e6", "surface-tint": "#465f88",
        "secondary": "#515f74", "error-container": "#ffdad6", "surface-container-low": "#f4f3f7",
        "surface-bright": "#faf9fd", "primary-container": "#002147", "tertiary-fixed-dim": "#e9c349",
        "tertiary": "#735c00", "primary-fixed": "#d6e3ff", "on-primary": "#ffffff",
        "surface-container-lowest": "#ffffff", "on-error-container": "#93000a",
        "on-primary-container": "#708ab5", "on-primary-fixed": "#001b3d",
        "secondary-fixed": "#d5e3fc", "error": "#ba1a1a", "inverse-surface": "#2f3033",
        "outline-variant": "#c4c6cf", "on-surface": "#1a1b1e", "on-secondary": "#ffffff",
        "inverse-on-surface": "#f1f0f4", "background": "#faf9fd", "on-tertiary": "#ffffff",
        "surface-container-high": "#e9e7eb", "secondary-fixed-dim": "#b9c7df", "on-background": "#1a1b1e",
        "success": "#1a6b3c", "success-container": "#b7f0d0"
      },
      borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      spacing: {
        "margin-mobile": "16px", "base": "4px", "margin-desktop": "48px",
        "xs": "8px", "gutter": "24px", "xl": "64px", "lg": "40px", "md": "24px", "sm": "16px"
      },
      fontFamily: {
        "body-sm": ["Public Sans"], "data-mono": ["Public Sans"],
        "headline-md": ['"Source Serif 4"'], "headline-lg-mobile": ['"Source Serif 4"'],
        "headline-lg": ['"Source Serif 4"'], "display-lg": ['"Source Serif 4"'],
        "label-md": ["Public Sans"], "body-lg": ["Public Sans"], "body-md": ["Public Sans"]
      },
      fontSize: {
        "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
        "data-mono": ["14px", { lineHeight: "20px", fontWeight: "500" }],
        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
        "headline-lg-mobile": ["28px", { lineHeight: "36px", fontWeight: "600" }],
        "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
        "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.02em", fontWeight: "600" }],
        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }]
      }
    }
  }
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen">

<!-- ===== LOGIN VIEW ===== -->
<div id="login-view" class="min-h-screen flex items-center justify-center p-sm">
  <div class="w-full max-w-md">
    <div class="text-center mb-lg">
      <div class="inline-flex h-14 w-14 rounded-xl bg-primary text-on-primary items-center justify-center mb-sm shadow-sm">
        <span class="material-symbols-outlined icon-fill text-[30px]">family_restroom</span>
      </div>
      <h1 class="font-headline-lg text-headline-lg text-primary">Parent Portal</h1>
      <p class="font-body-md text-body-md text-on-surface-variant">Sign in to view your child's report</p>
    </div>

    <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm p-md md:p-lg">
      <form id="login-form" class="space-y-md" autocomplete="off">
        <div>
          <label for="username" class="block font-label-md text-label-md text-on-surface-variant mb-xs">Username</label>
          <input id="username" type="text" required autofocus placeholder="e.g. parent_maya"
            class="w-full rounded-lg border-outline-variant/60 bg-surface-container-low focus:border-primary focus:ring-primary font-body-md text-body-md"/>
        </div>
        <div>
          <label for="password" class="block font-label-md text-label-md text-on-surface-variant mb-xs">Password</label>
          <input id="password" type="password" required placeholder="••••••••"
            class="w-full rounded-lg border-outline-variant/60 bg-surface-container-low focus:border-primary focus:ring-primary font-body-md text-body-md"/>
        </div>
        <p id="login-error" class="hidden font-body-sm text-body-sm text-error bg-error-container/30 border border-error/20 rounded-lg px-sm py-xs"></p>
        <button type="submit" id="login-btn"
          class="w-full bg-primary text-on-primary py-sm rounded-lg font-label-md text-label-md hover:opacity-90 transition-opacity shadow-sm flex items-center justify-center gap-xs disabled:opacity-50">
          <span class="material-symbols-outlined text-[18px]">login</span> Sign in
        </button>
      </form>

      <button id="adv-toggle" class="mt-sm font-body-sm text-body-sm text-on-surface-variant hover:text-primary">Advanced ▾</button>
      <div id="adv" class="hidden mt-xs">
        <label for="api-url" class="block font-label-md text-label-md text-on-surface-variant mb-xs">Student API server</label>
        <input id="api-url" type="url" placeholder="http://localhost:8085"
          class="w-full rounded-lg border-outline-variant/60 bg-surface-container-low focus:border-primary focus:ring-primary text-body-sm font-body-sm"/>
      </div>
    </div>

    <div class="mt-md bg-surface-container-low border border-outline-variant/20 rounded-xl p-sm">
      <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider text-[11px] mb-xs">Demo parent accounts</p>
      <div class="grid grid-cols-1 gap-xs font-body-sm text-body-sm text-on-surface-variant">
        <button data-fill="parent_maya" class="text-left flex justify-between hover:text-primary transition-colors"><span>Maya's parent</span><span class="font-data-mono">parent_maya / parent123</span></button>
        <button data-fill="parent_james" class="text-left flex justify-between hover:text-primary transition-colors"><span>James's parent</span><span class="font-data-mono">parent_james / parent123</span></button>
      </div>
      <p class="font-body-sm text-body-sm text-on-surface-variant/70 mt-xs">Each parent sees only their own child's report — enforced by the server.</p>
    </div>
  </div>
</div>

<!-- ===== REPORT VIEW ===== -->
<div id="report-view" class="hidden min-h-screen">
  <header class="bg-surface/80 backdrop-blur-md sticky top-0 z-30 border-b border-outline-variant/30 shadow-sm">
    <div class="flex justify-between items-center h-16 px-gutter w-full max-w-[1000px] mx-auto">
      <div class="flex items-center gap-sm">
        <span class="material-symbols-outlined text-primary icon-fill">family_restroom</span>
        <span class="font-headline-md text-headline-md font-bold text-primary">Parent Portal</span>
      </div>
      <div class="flex items-center gap-sm">
        <span id="parent-name" class="hidden sm:inline font-body-sm text-body-sm text-on-surface-variant"></span>
        <button id="logout-btn" class="flex items-center gap-xs px-sm py-xs rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-container transition-colors">
          <span class="material-symbols-outlined text-[18px]">logout</span> Sign out
        </button>
      </div>
    </div>
  </header>

  <main class="p-sm md:p-gutter max-w-[1000px] mx-auto w-full">
    <div id="report-body"></div>
  </main>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }

  // ----- config / state -----
  const API_KEY = 'scholastica-api-url';
  const TOK_KEY = 'scholastica-parent-token';
  const getApi = () => (localStorage.getItem(API_KEY) || 'http://localhost:8085').replace(/\/+$/, '');
  const setApi = u => localStorage.setItem(API_KEY, (u || '').trim().replace(/\/+$/, ''));
  const getTok = () => localStorage.getItem(TOK_KEY) || '';

  const loginView = document.getElementById('login-view');
  const reportView = document.getElementById('report-view');

  // ----- grading helpers (display only) -----
  function letterFromPct(p) {
    if (p >= 93) return 'A'; if (p >= 90) return 'A-'; if (p >= 87) return 'B+';
    if (p >= 83) return 'B'; if (p >= 80) return 'B-'; if (p >= 77) return 'C+';
    if (p >= 73) return 'C'; if (p >= 70) return 'C-'; if (p >= 65) return 'D'; return 'F';
  }
  function letterBadge(l) {
    if (l[0] === 'A') return 'bg-success-container text-success';
    if (l[0] === 'B') return 'bg-secondary-container text-on-secondary-container';
    if (l[0] === 'C') return 'bg-tertiary-fixed text-on-tertiary-container';
    return 'bg-error-container text-error';
  }
  function gedBand(s) {
    if (s >= 175) return { label: 'Honors', text: 'text-tertiary', badge: 'bg-tertiary-fixed text-on-tertiary-container' };
    if (s >= 165) return { label: 'College Ready', text: 'text-secondary', badge: 'bg-secondary-container text-on-secondary-container' };
    if (s >= 145) return { label: 'Passing', text: 'text-success', badge: 'bg-success-container text-success' };
    return { label: 'Not Yet Passing', text: 'text-error', badge: 'bg-error-container text-error' };
  }
  function trendIcon(t) {
    if (t === 'up') return '<span class="material-symbols-outlined text-success text-[18px] icon-fill">trending_up</span>';
    if (t === 'down') return '<span class="material-symbols-outlined text-error text-[18px] icon-fill">trending_down</span>';
    return '<span class="material-symbols-outlined text-on-surface-variant text-[18px]">trending_flat</span>';
  }
  const avg = a => a.reduce((x, y) => x + y, 0) / a.length;
  const esc = s => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

  // ----- views -----
  function showLogin() { reportView.classList.add('hidden'); loginView.classList.remove('hidden'); }
  function showReport() { loginView.classList.add('hidden'); reportView.classList.remove('hidden'); }

  function renderReport(parentName, s) {
    document.getElementById('parent-name').textContent = parentName ? 'Signed in as ' + parentName : '';
    const r = s.report, isGed = r.grading === 'ged';
    const scores = r.subjects.map(x => x.score);
    const mean = avg(scores);
    const att = Math.round(r.subjects.reduce((a, x) => a + x.attended, 0) / r.subjects.reduce((a, x) => a + x.total, 0) * 100);

    const stats = isGed
      ? [
          { v: Math.round(mean), l: 'Avg Score' },
          { v: att + '%', l: 'Attendance' },
          { v: scores.filter(x => x >= 145).length + '/4', l: 'Passing' },
          { v: scores.filter(x => x >= 165).length + '/4', l: 'College Ready', accent: true },
        ]
      : [
          { v: Math.round(mean) + '%', l: 'Average' },
          { v: att + '%', l: 'Attendance' },
          { v: letterFromPct(mean), l: 'Grade' },
          { v: mean >= 90 ? 'Yes' : '—', l: 'Honor Roll', accent: true },
        ];

    const rows = r.subjects.map(x => {
      let scoreCell, badge;
      if (isGed) {
        const b = gedBand(x.score);
        scoreCell = `<span class="font-data-mono text-data-mono ${b.text}">${x.score}</span>`;
        badge = `<span class="${b.badge} text-[11px] font-bold px-xs py-[2px] rounded uppercase">${b.label}</span>`;
      } else {
        const l = letterFromPct(x.score);
        scoreCell = `<span class="font-data-mono text-data-mono ${x.score >= 90 ? 'text-success' : 'text-primary'}">${x.score}%</span>`;
        badge = `<span class="${letterBadge(l)} text-[11px] font-bold px-xs py-[2px] rounded uppercase">${l}</span>`;
      }
      return `<tr class="hover:bg-surface-container-low/50">
        <td class="px-md py-sm"><span class="font-label-md text-label-md text-on-surface">${esc(x.name)}</span><span class="block font-body-sm text-body-sm text-on-surface-variant">${esc(x.code)}</span></td>
        <td class="px-sm py-sm text-center">${scoreCell}</td>
        <td class="px-sm py-sm text-center">${badge}</td>
        <td class="px-md py-sm text-right">${trendIcon(x.trend)}</td>
      </tr>`;
    }).join('');

    const maxV = isGed ? 200 : 100;
    const bars = r.trend.map((d, i) => {
      const h = Math.round(d.value / maxV * 100), last = i === r.trend.length - 1;
      return `<div class="flex-1 flex flex-col items-center gap-xs h-full justify-end">
        <span class="font-data-mono text-[11px] ${last ? 'text-primary font-bold' : 'text-on-surface-variant'}">${d.value}</span>
        <div class="w-full ${last ? 'bg-primary' : 'bg-primary-fixed-dim'} rounded-t-lg" style="height:${h}%"></div>
        <span class="font-label-md text-[10px] text-on-surface-variant uppercase">${esc(d.term)}</span>
      </div>`;
    }).join('');

    const exams = r.exams || [];
    const examRows = exams.length ? exams.map(e => {
      const pct = (e.percent == null) ? '—' : e.percent + '%';
      const col = (e.percent == null) ? 'text-on-surface-variant' : (e.percent >= 50 ? 'text-success' : 'text-error');
      const date = e.completed_at ? new Date(e.completed_at).toLocaleDateString() : '';
      return `<tr class="hover:bg-surface-container-low/50">
        <td class="px-md py-sm"><span class="font-label-md text-label-md text-on-surface">${esc(e.exam)}</span>${date ? `<span class="block font-body-sm text-body-sm text-on-surface-variant">${date}</span>` : ''}</td>
        <td class="px-sm py-sm text-center font-data-mono text-data-mono text-on-surface">${e.score}/${e.total}</td>
        <td class="px-md py-sm text-right font-data-mono text-data-mono ${col}">${pct}</td>
      </tr>`;
    }).join('') : `<tr><td colspan="3" class="px-md py-md text-center font-body-sm text-body-sm text-on-surface-variant">No exam results yet.</td></tr>`;

    document.getElementById('report-body').innerHTML = `
      <section class="mb-lg">
        <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-base">${esc(r.term)}</p>
        <h2 class="font-headline-lg text-headline-lg text-primary mb-xs">${esc(s.name)}</h2>
        <p class="font-body-md text-body-md text-on-surface-variant">${esc(s.program)} · ${esc(s.grade)}</p>
      </section>

      <section class="grid grid-cols-2 lg:grid-cols-4 gap-sm mb-gutter">
        ${stats.map(st => `
          <div class="${st.accent ? 'bg-tertiary-container/20 border-tertiary-container/40' : 'bg-surface-container-lowest border-outline-variant/30'} border rounded-xl px-md py-sm text-center shadow-sm">
            <span class="block font-headline-lg text-headline-lg ${st.accent ? 'text-tertiary' : 'text-primary'} tabular-nums">${st.v}</span>
            <span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider text-[10px]">${st.l}</span>
          </div>`).join('')}
      </section>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
        <div class="md:col-span-2 space-y-gutter">
          <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm overflow-hidden">
            <div class="p-md border-b border-outline-variant/20"><h3 class="font-headline-md text-headline-md text-primary">Course Grades</h3></div>
            <div class="overflow-x-auto"><table class="w-full min-w-[460px]">
              <thead><tr class="bg-surface-container-low">
                <th class="text-left px-md py-xs font-label-md text-label-md text-on-surface-variant uppercase text-[11px]">Subject</th>
                <th class="text-center px-sm py-xs font-label-md text-label-md text-on-surface-variant uppercase text-[11px]">${isGed ? 'Score' : 'Score'}</th>
                <th class="text-center px-sm py-xs font-label-md text-label-md text-on-surface-variant uppercase text-[11px]">${isGed ? 'Status' : 'Grade'}</th>
                <th class="text-right px-md py-xs font-label-md text-label-md text-on-surface-variant uppercase text-[11px]">Trend</th>
              </tr></thead>
              <tbody class="divide-y divide-outline-variant/20">${rows}</tbody>
            </table></div>
          </div>
          <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-md shadow-sm">
            <h3 class="font-headline-md text-headline-md text-primary mb-md">${isGed ? 'Practice Score Trend' : 'Progress'}</h3>
            <div class="flex items-end justify-between gap-sm h-44 pt-md">${bars}</div>
          </div>
          <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm overflow-hidden">
            <div class="p-md border-b border-outline-variant/20 flex items-center gap-sm">
              <span class="material-symbols-outlined text-primary">quiz</span>
              <h3 class="font-headline-md text-headline-md text-primary">Exam Results</h3>
            </div>
            <div class="overflow-x-auto"><table class="w-full min-w-[360px]">
              <thead><tr class="bg-surface-container-low">
                <th class="text-left px-md py-xs font-label-md text-label-md text-on-surface-variant uppercase text-[11px]">Exam</th>
                <th class="text-center px-sm py-xs font-label-md text-label-md text-on-surface-variant uppercase text-[11px]">Score</th>
                <th class="text-right px-md py-xs font-label-md text-label-md text-on-surface-variant uppercase text-[11px]">Result</th>
              </tr></thead>
              <tbody class="divide-y divide-outline-variant/20">${examRows}</tbody>
            </table></div>
          </div>
        </div>
        <div class="space-y-gutter">
          <div class="bg-primary rounded-xl p-md text-on-primary shadow-sm">
            <div class="flex items-center gap-sm mb-sm">
              <span class="material-symbols-outlined text-tertiary-fixed icon-fill text-[32px]">military_tech</span>
              <div>
                <span class="block font-label-md text-label-md text-on-primary/70 uppercase tracking-widest text-[10px]">${esc(r.achievement.tag)}</span>
                <span class="block font-headline-md text-headline-md">${esc(r.achievement.title)}</span>
              </div>
            </div>
            <p class="font-body-sm text-body-sm text-on-primary/80">${esc(r.achievement.note)}</p>
          </div>
          <div class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-md">
            <div class="flex items-center gap-xs text-on-surface-variant">
              <span class="material-symbols-outlined text-[18px]">lock</span>
              <span class="font-body-sm text-body-sm">You can only see this student's report. Access is checked on the server.</span>
            </div>
          </div>
        </div>
      </div>`;
  }

  async function loadReport() {
    try {
      const me = await fetch(getApi() + '/api/me', { headers: { Authorization: 'Bearer ' + getTok() } });
      if (!me.ok) throw new Error('auth');
      const user = await me.json();
      const rep = await fetch(getApi() + '/api/my-report', { headers: { Authorization: 'Bearer ' + getTok() } });
      if (!rep.ok) throw new Error('report');
      renderReport(user.name, await rep.json());
      showReport();
    } catch (e) {
      localStorage.removeItem(TOK_KEY);
      showLogin();
    }
  }

  // ----- login wiring -----
  document.getElementById('api-url').value = getApi();
  document.getElementById('adv-toggle').addEventListener('click', () =>
    document.getElementById('adv').classList.toggle('hidden'));
  document.getElementById('api-url').addEventListener('change', e => setApi(e.target.value));
  document.querySelectorAll('[data-fill]').forEach(b => b.addEventListener('click', () => {
    document.getElementById('username').value = b.dataset.fill;
    document.getElementById('password').value = 'parent123';
    document.getElementById('password').focus();
  }));

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const err = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    err.classList.add('hidden');
    btn.disabled = true;
    try {
      const r = await fetch(getApi() + '/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Login failed');
      localStorage.setItem(TOK_KEY, data.token);
      await loadReport();
    } catch (ex) {
      err.textContent = /Failed to fetch|NetworkError/i.test(ex.message)
        ? 'Cannot reach the student API at ' + getApi() + '. Is it running? (docker compose up -d api)'
        : ex.message;
      err.classList.remove('hidden');
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem(TOK_KEY);
    showLogin();
  });

  // ----- boot -----
  if (getTok()) loadReport(); else showLogin();
</script>
</body>
</html>
