# Baseline hardening for the static apps (portal / parent / elibrary).
# Copied into the image by Dockerfile.static.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;            # clickjacking
    add_header X-Content-Type-Options "nosniff" always;        # MIME sniffing
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: allow the CDNs/fonts the pages actually use + inline scripts/styles;
    # connect-src is left open so the configurable local services (API, LLM,
    # Kiwix, calibre-web, etc., on various host:port) keep working.
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' https: data:; connect-src *; frame-ancestors 'self'; base-uri 'self'" always;

    location / {
        try_files $uri $uri/ =404;
    }
}
