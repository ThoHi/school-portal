# Scholastica — three isolated static apps, each on its own port.
#
# Each service is an nginx container whose web root contains ONLY that app's
# pages plus the shared JS/icon (bind-mounted from ./shared). Isolation is
# physical: the parent container has no grades.html, so it cannot be reached
# even by guessing the URL.
#
# Forward these ports with a VS Code tunnel to expose them publicly:
#   8080 → main portal   (students / teachers — keep internal)
#   8081 → parent portal (safe to forward publicly for parents)
#   8082 → e-library     (launcher; books are served by calibre-web on 8083)
#
# Run:  docker compose up -d      Stop:  docker compose down

# Each static app is built from Dockerfile.static, which copies shared/ + that
# app's own files into the nginx web root. Rebuild after editing files:
#   docker compose up -d --build
services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile.static
      args:
        APP: portal
    image: scholastica-portal
    container_name: scholastica-portal
    restart: unless-stopped
    ports:
      - "8080:80"

  parent:
    build:
      context: .
      dockerfile: Dockerfile.static
      args:
        APP: parent
    image: scholastica-parent
    container_name: scholastica-parent
    restart: unless-stopped
    ports:
      - "8081:80"

  elibrary:
    build:
      context: .
      dockerfile: Dockerfile.static
      args:
        APP: elibrary
    image: scholastica-elibrary
    container_name: scholastica-elibrary
    restart: unless-stopped
    ports:
      - "8082:80"

  # Exam app — the separate Flask project ThoHi/exam-test-webapp.
  # Clone it next to this repo so the build context ../exam-test-webapp exists:
  #   git clone https://github.com/ThoHi/exam-test-webapp ../exam-test-webapp
  # The portal's Exam Center page launches into http://<host>:8084.
  exam:
    build: ../exam-test-webapp
    container_name: scholastica-exam
    restart: unless-stopped
    environment:
      # Shared secret so the student API can read results for the parent portal.
      - SERVICE_TOKEN=link-token-change-me
    ports:
      - "8084:5000"
    volumes:
      # Persist the SQLite database across rebuilds. Flask-SQLAlchemy 3.x keeps
      # sqlite:///exam.db under the instance folder (/app/instance). If that
      # project pins SQLAlchemy 2.x, the file is /app/exam.db instead — change
      # the target path below to match. Verify with:
      #   docker compose exec exam sh -c 'find / -name exam.db 2>/dev/null'
      - exam-data:/app/instance

  # Student API — the authoritative student database (backend/). Authenticates
  # each parent and returns ONLY their child's report (parent A asking for
  # student B gets 403). The parent app (8081) reads from http://<host>:8085.
  api:
    build: ./backend
    container_name: scholastica-api
    restart: unless-stopped
    environment:
      - SECRET_KEY=change-this-api-secret   # set a real secret before production
      # Pull exam results from the exam app (same compose network) and merge them
      # into each student's report. EXAM_SERVICE_TOKEN must match exam's SERVICE_TOKEN.
      - EXAM_API_URL=http://exam:5000
      - EXAM_SERVICE_TOKEN=link-token-change-me
    ports:
      - "8085:8000"
    volumes:
      - api-data:/data
    depends_on:
      - exam

volumes:
  exam-data:
  api-data:
