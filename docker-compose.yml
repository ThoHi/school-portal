# Scholastica — three isolated static apps, each on its own port.
#
# Each service is an nginx container whose web root contains ONLY that app's
# pages plus the shared JS/icon (bind-mounted from ./shared). Isolation is
# physical: the parent container has no grades.html, so it cannot be reached
# even by guessing the URL.
#
# Forward these ports with a VS Code tunnel to expose them publicly:
#   8080 → main portal   (students / teachers — keep internal)
#   8081 → parent portal (safe to forward publicly for parents)
#   8082 → e-library     (launcher; books are served by calibre-web on 8083)
#
# Run:  docker compose up -d      Stop:  docker compose down

# Each static app is built from Dockerfile.static, which copies shared/ + that
# app's own files into the nginx web root. Rebuild after editing files:
#   docker compose up -d --build
services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile.static
      args:
        APP: portal
    image: scholastica-portal
    container_name: scholastica-portal
    restart: unless-stopped
    ports:
      - "8080:80"

  parent:
    build:
      context: .
      dockerfile: Dockerfile.static
      args:
        APP: parent
    image: scholastica-parent
    container_name: scholastica-parent
    restart: unless-stopped
    ports:
      - "8081:80"

  elibrary:
    build:
      context: .
      dockerfile: Dockerfile.static
      args:
        APP: elibrary
    image: scholastica-elibrary
    container_name: scholastica-elibrary
    restart: unless-stopped
    ports:
      - "8082:80"

  # Exam app — the separate Flask project ThoHi/exam-test-webapp.
  # Clone it next to this repo so the build context ../exam-test-webapp exists:
  #   git clone https://github.com/ThoHi/exam-test-webapp ../exam-test-webapp
  # The portal's Exam Center page launches into http://<host>:8084.
  exam:
    build: ../exam-test-webapp
    container_name: scholastica-exam
    restart: unless-stopped
    environment:
      # Shared secret so the student API can read results for the parent portal.
      - SERVICE_TOKEN=link-token-change-me
    ports:
      - "8084:5000"
    volumes:
      # Persist the SQLite database across rebuilds. Flask-SQLAlchemy 3.x keeps
      # sqlite:///exam.db under the instance folder (/app/instance). If that
      # project pins SQLAlchemy 2.x, the file is /app/exam.db instead — change
      # the target path below to match. Verify with:
      #   docker compose exec exam sh -c 'find / -name exam.db 2>/dev/null'
      - exam-data:/app/instance

  # Student API — the authoritative student database (backend/). Authenticates
  # each parent and returns ONLY their child's report (parent A asking for
  # student B gets 403). The parent app (8081) reads from http://<host>:8085.
  api:
    build: ./backend
    container_name: scholastica-api
    restart: unless-stopped
    environment:
      - SECRET_KEY=change-this-api-secret   # set a real secret before production
      # Pull exam results from the exam app (same compose network) and merge them
      # into each student's report. EXAM_SERVICE_TOKEN must match exam's SERVICE_TOKEN.
      - EXAM_API_URL=http://exam:5000
      - EXAM_SERVICE_TOKEN=link-token-change-me
    ports:
      - "8085:8000"
    volumes:
      - api-data:/data
    depends_on:
      - exam

  # AI proxy — one OpenAI-compatible endpoint for the Research chat. Tries the
  # LOCAL model first (Ollama / LM Studio) and falls back to a CLOUD provider
  # when local is down. The cloud key stays here, never in the browser. Point the
  # Research assistant's server URL at http://<host>:8087/v1.
  ai-proxy:
    build: ./ai-proxy
    container_name: scholastica-ai-proxy
    restart: unless-stopped
    environment:
      # Local model (OpenAI-compatible). Ollama on the host = :11434/v1;
      # LM Studio = :1234/v1. Use host.docker.internal to reach the host.
      - LOCAL_API_URL=http://host.docker.internal:11434/v1
      - LOCAL_MODEL=                # optional: force a model name for local
      # Cloud fallback (decide later). Any OpenAI-compatible API works by URL+key:
      #   OpenAI       https://api.openai.com/v1
      #   OpenRouter   https://openrouter.ai/api/v1
      - CLOUD_API_URL=
      - CLOUD_API_KEY=
      - CLOUD_MODEL=
      - MAX_CONCURRENCY=1           # CPU does ~1 inference at a time
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host-installed Ollama on Linux
    ports:
      - "8087:8000"

  # AI Notebook — "ask my school notes" (RAG) for students. A teacher uploads
  # notes/PDFs; questions are answered from those notes. Embeddings via Ollama,
  # generation via the ai-proxy (so it inherits local-first + cloud fallback).
  ai-notebook:
    build: ./ai-notebook
    container_name: scholastica-ai-notebook
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434      # for embeddings
      - EMBED_MODEL=nomic-embed-text                       # ollama pull nomic-embed-text
      - PROXY_URL=http://ai-proxy:8000/v1                  # generation via the proxy
      - ADMIN_TOKEN=change-me-notebook-admin               # teacher upload token
      - TOP_K=3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8088:8000"
    volumes:
      - notebook-data:/data
    depends_on:
      - ai-proxy

  # Offline Wikipedia (Kiwix). Opt-in: only starts with `--profile wiki`, because
  # it needs ZIM files (multi-GB) downloaded into ./wikipedia/zim first. The
  # Research page probes http://<host>:8086 and falls back to online wikipedia.org.
  #   docker compose --profile wiki up -d wikipedia
  wikipedia:
    image: ghcr.io/kiwix/kiwix-tools
    container_name: scholastica-wikipedia
    restart: unless-stopped
    profiles: ["wiki"]
    command: ["sh", "-c", "kiwix-serve --port=8080 /data/*.zim"]
    ports:
      - "8086:8080"
    volumes:
      - ./wikipedia/zim:/data:ro

volumes:
  exam-data:
  api-data:
  notebook-data:
